<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bestell-Portal | Vereinsshop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .product-card:hover {
        border-color: #3b82f6;
      }
    </style>
  </head>
  <body class="bg-[#fafafa] text-slate-900 min-h-screen pb-20">
    <div id="app" class="max-w-xl mx-auto px-6">
      <header class="pt-16 pb-12 text-center">
        <div class="mx-auto w-full max-w-md flex justify-center mb-6">
          <img src="logo.svg" alt="Vereinslogo" class="h-20 w-auto" />
        </div>
        <h1 class="text-2xl font-bold tracking-tight text-slate-900">
          JSV Kollektion Bestellformular
        </h1>
        <p class="text-slate-500 mt-2 text-sm">
          Wähle deine Produkte und Größen aus
        </p>
      </header>

      <div id="shop-view" class="space-y-10">
        <section>
          <div id="product-list" class="grid gap-3"></div>
        </section>

        <section
          class="bg-white rounded-3xl p-8 border border-slate-100 shadow-sm"
        >
          <div class="flex items-center gap-2 mb-6">
            <span class="text-lg font-semibold">Warenkorb</span>
            <span
              id="cart-count"
              class="bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded-full"
              >0</span
            >
          </div>

          <ul id="cart-list" class="divide-y divide-slate-100 mb-6">
            <li class="py-4 text-slate-400 text-sm italic text-center">
              Noch keine Artikel ausgewählt
            </li>
          </ul>

          <div class="flex justify-between items-center pb-8">
            <span class="text-slate-500">Gesamtsumme</span>
            <span class="text-xl font-bold text-blue-600"
              ><span id="total-price">0</span> €</span
            >
          </div>

          <form
            id="order-form"
            onsubmit="handleCheckout(event)"
            class="space-y-4"
          >
            <div class="grid grid-cols-2 gap-3">
              <input
                type="text"
                id="cust-first-name"
                required
                placeholder="Vorname"
                class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 transition-all outline-none"
              />
              <input
                type="text"
                id="cust-last-name"
                required
                placeholder="Nachname"
                class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 transition-all outline-none"
              />
            </div>
            <input
              type="email"
              id="cust-email"
              required
              placeholder="E-Mail Adresse"
              class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 transition-all outline-none"
            />

            <div class="pt-2">
              <label
                class="text-[10px] uppercase tracking-wider font-bold text-slate-400 ml-1"
                >Sicherheit</label
              >
              <input
                type="password"
                id="order-password"
                required
                placeholder="Bestell-Passwort"
                class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-red-400 transition-all outline-none"
              />
            </div>

            <div
              id="error-message"
              class="hidden text-red-500 text-xs font-medium bg-red-50 p-4 rounded-xl border border-red-100"
            ></div>

            <button
              type="submit"
              id="submit-btn"
              class="w-full bg-slate-900 hover:bg-black text-white font-semibold py-4 rounded-2xl transition-all duration-300 shadow-lg shadow-slate-200 active:scale-[0.98]"
            >
              Jetzt bestellen
            </button>
          </form>
        </section>
      </div>

      <div
        id="success-view"
        class="hidden pt-10 text-center animate-in fade-in zoom-in duration-500"
      >
        <div
          class="inline-flex items-center justify-center w-20 h-20 bg-green-50 text-green-500 rounded-full mb-6"
        >
          <svg
            class="w-10 h-10"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M5 13l4 4L19 7"
            ></path>
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-slate-900">Bestellung erhalten!</h2>
        <p class="text-slate-500 mt-2">
          Wir haben deine Bestellung erfolgreich aufgenommen.
        </p>

        <div
          id="order-summary"
          class="mt-8 p-6 bg-white rounded-3xl border border-slate-100 text-left space-y-3"
        ></div>

        <button
          onclick="window.location.reload()"
          class="mt-8 text-sm font-medium text-blue-600 hover:text-blue-700"
        >
          Zurück zum Shop
        </button>
      </div>
    </div>

    <script>
      const CONFIG = {
        scriptURL:
          "https://script.google.com/macros/s/AKfycbxlq6Uhezl8qw7zdtflRjcTPkHER_aX2SCINeaevyoOP2HXT87LoKdzhIQcgsx4hO22/exec",
        produkte: {
          Kapuzenjacke: {
            Erwachsene: { preis: 25, groessen: ["S", "M", "L", "XL"] },
            Kinder: { preis: 15, groessen: ["128", "140", "152", "164"] },
          },
          Polyesterjacke: {
            Erwachsene: { preis: 45, groessen: ["M", "L", "XXL"] },
            Kinder: { preis: 30, groessen: ["152", "164"] },
          },
        },
      };

      let cart = [];

      const productList = document.getElementById("product-list");
      for (let pName in CONFIG.produkte) {
        productList.innerHTML += `
            <div class="product-card p-5 bg-white border border-slate-100 rounded-2xl flex justify-between items-center transition-all duration-300 group">
                <div class="flex-1">
                    <h4 class="font-semibold text-slate-800">${pName}</h4>
                    <div class="flex gap-2 mt-2">
                        <select id="type-${pName}" onchange="updateSizes('${pName}')" 
                            class="text-[11px] font-medium bg-slate-100 border-none rounded-lg px-2 py-1 outline-none cursor-pointer">
                            <option value="Erwachsene">Erwachsene</option>
                            <option value="Kinder">Kinder</option>
                        </select>
                        <select id="size-${pName}" class="text-[11px] font-medium bg-slate-100 border-none rounded-lg px-2 py-1 outline-none cursor-pointer"></select>
                    </div>
                </div>
                <button onclick="addToCart('${pName}')" 
                    class="bg-blue-50 text-blue-600 px-5 py-2 rounded-xl text-sm font-semibold hover:bg-blue-600 hover:text-white transition-colors">
                    Hinzufügen
                </button>
            </div>
        `;
        updateSizes(pName);
      }

      function updateSizes(pName) {
        const type = document.getElementById(`type-${pName}`).value;
        const sizeSelect = document.getElementById(`size-${pName}`);
        const data = CONFIG.produkte[pName][type];
        sizeSelect.innerHTML = data.groessen
          .map((s) => `<option value="${s}">${s} (${data.preis}€)</option>`)
          .join("");
      }

      function addToCart(pName) {
        const type = document.getElementById(`type-${pName}`).value;
        const size = document.getElementById(`size-${pName}`).value;
        const preis = CONFIG.produkte[pName][type].preis;
        cart.push({ id: Date.now(), pName, size, preis });
        renderCart();
      }

      function removeFromCart(id) {
        cart = cart.filter((item) => item.id !== id);
        renderCart();
      }

      function renderCart() {
        const list = document.getElementById("cart-list");
        const total = cart.reduce((sum, item) => sum + item.preis, 0);
        document.getElementById("cart-count").innerText = cart.length;

        if (cart.length === 0) {
          list.innerHTML = `<li class="py-4 text-slate-400 text-sm italic text-center">Noch keine Artikel ausgewählt</li>`;
        } else {
          list.innerHTML = cart
            .map(
              (item) => `
                <li class="flex justify-between items-center py-3 animate-in fade-in slide-in-from-right-2 duration-300">
                    <div>
                        <p class="text-sm font-medium text-slate-800">${item.pName}</p>
                        <p class="text-[11px] text-slate-400">${item.size} • ${item.preis} €</p>
                    </div>
                    <button onclick="removeFromCart(${item.id})" class="text-slate-300 hover:text-red-500 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </li>
            `,
            )
            .join("");
        }
        document.getElementById("total-price").innerText = total;
      }

      async function handleCheckout(event) {
        event.preventDefault();
        if (cart.length === 0) return alert("Warenkorb ist leer!");

        const errorBox = document.getElementById("error-message");
        const submitBtn = document.getElementById("submit-btn");
        errorBox.classList.add("hidden");

        const payload = {
          password: document.getElementById("order-password").value,
          firstName: document.getElementById("cust-first-name").value,
          lastName: document.getElementById("cust-last-name").value,
          email: document.getElementById("cust-email").value,
          total: document.getElementById("total-price").innerText,
          produkte: {},
        };

        cart.forEach((item) => {
          if (!payload.produkte[item.pName]) payload.produkte[item.pName] = [];
          payload.produkte[item.pName].push(item.size);
        });

        submitBtn.disabled = true;
        submitBtn.innerText = "Wird gesendet...";

        try {
          const response = await fetch(CONFIG.scriptURL, {
            method: "POST",
            body: JSON.stringify(payload),
          });
          const result = await response.json();

          if (result.status === "success") {
            showSuccess(payload, result.orderId);
          } else {
            throw new Error(result.message);
          }
        } catch (e) {
          errorBox.innerText = "Fehler: " + e.message;
          errorBox.classList.remove("hidden");
          document.getElementById("order-password").value = "";
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerText = "Jetzt bestellen";
        }
      }

      function showSuccess(data, orderId) {
        document.getElementById("shop-view").classList.add("hidden");
        document.getElementById("success-view").classList.remove("hidden");
        window.scrollTo(0, 0);

        const summary = document.getElementById("order-summary");
        let itemsHtml = Object.entries(data.produkte)
          .map(
            ([name, sizes]) =>
              `<div class="flex justify-between text-sm"><span>${name}</span> <span class="text-slate-500">${sizes.join(", ")}</span></div>`,
          )
          .join("");

        summary.innerHTML = `
            <div class="space-y-1 pb-4 border-b border-slate-100">
                <p class="text-xs uppercase tracking-wider text-slate-400 font-bold">Besteller</p>
                <p class="font-medium">${data.firstName} ${data.lastName}</p>
                <p class="text-sm text-slate-500">${data.email}</p>
            </div>
            <div class="space-y-1 pb-4 border-b border-slate-100">
                <p class="text-xs uppercase tracking-wider text-slate-400 font-bold">Bestell-ID</p>
                <p class="font-medium">${orderId}</p>
            </div>
            <div class="space-y-2 pt-2">
                <p class="text-xs uppercase tracking-wider text-slate-400 font-bold mb-3">Positionen</p>
                ${itemsHtml}
            </div>
            <div class="pt-4 border-t border-slate-100 flex justify-between items-center">
                <span class="font-bold">Gesamtbetrag</span>
                <span class="text-lg font-bold text-blue-600">${data.total} €</span>
            </div>
        `;
      }
    </script>
  </body>
</html>
